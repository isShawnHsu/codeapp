name: Build & Export Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macOS-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 1. 下载底层依赖
      - name: Download Frameworks
        run: |
          chmod +x ./downloadFrameworks.sh
          ./downloadFrameworks.sh

      # 2. 终极智能扫描并编译
      - name: Auto Detect Scheme & Build
        run: |
          echo "==== 正在扫描项目所有的 Schemes ===="
          # 列出 Code.xcodeproj 的所有信息并打印
          xcodebuild -project Code.xcodeproj -list
          
          # 【核心黑科技】自动抓取合法的第一个 Scheme 名字（排除掉那些乱七八糟的依赖项）
          # 优先寻找包含 Code 或 App 字眼的 Scheme，找不到就拿第一个
          TARGET_SCHEME=$(xcodebuild -project Code.xcodeproj -list | sed -n '/Schemes:/,$p' | egrep -v 'Schemes:|Pods' | sed -e 's/^[[:space:]]*//' | head -n 1)
          
          if [ -z "$TARGET_SCHEME" ]; then
            echo "错误：实在没找到任何合法的 Scheme！"
            exit 1
          fi
          
          echo "==== 自动锁定的主编译 Scheme 是: [$TARGET_SCHEME] ===="
          
          # 开始免签编译
          xcodebuild archive \
            -project Code.xcodeproj \
            -scheme "$TARGET_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/Code.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      # 3. 动态匹配并打包成 IPA
      - name: Package to IPA
        run: |
          mkdir -p ./build/Payload
          APP_PATH=$(find ./build/Code.xcarchive/Products/Applications -name "*.app" | head -n 1)
          echo "找到的实际 App 路径: $APP_PATH"
          
          cp -r "$PATH" ./build/Payload/ 2>/dev/null || cp -r ./build/Code.xcarchive/Products/Applications/*.app ./build/Payload/
          cd ./build
          zip -r Code.ipa Payload
          
      # 4. 上传产物
      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: CodeApp-TrollStore-Unsigned
          path: ./build/Code.ipa
