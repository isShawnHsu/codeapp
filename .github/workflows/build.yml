name: Build & Export Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击按钮触发编译

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macOS-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 1. 下载 CodeApp 运行所需的底层依赖和 framework 资源
      - name: Download Frameworks
        run: |
          chmod +x ./downloadFrameworks.sh
          ./downloadFrameworks.sh

      # 2. 强行关闭 Xcode 新版 Explicit Modules，解决第三方混编库崩溃
      - name: Build with Xcode (No Signing)
        run: |
          xcodebuild archive \
            -project Code.xcodeproj \
            -scheme "Code App" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/Code.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEBUG_INFORMATION_FORMAT=dwarf \
            SWIFT_COMPILATION_MODE=wholemodule \
            RUN_DOCUMENTATION_COMPILER=NO \
            VALIDATE_WORKSPACE=NO \
            ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
            CLANG_ENABLE_MODULE_DEBUGGING=NO \
            SWIFT_USE_EXPLICIT_MODULE_BUILD=NO \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO

      # 3. 动态提取编译生成的 .app 文件夹，规范化打包为标准 .ipa
      - name: Package to IPA
        run: |
          mkdir -p ./build/Payload
          
          # 自动寻找编译出来的 .app 文件夹并复制到 Payload 目录下
          APP_PATH=$(find ./build/Code.xcarchive/Products/Applications -name "*.app" | head -n 1)
          echo "找到的实际 App 路径: $APP_PATH"
          
          cp -r "$APP_PATH" ./build/Payload/
          cd ./build
          zip -r Code.ipa Payload
          
      # 4. 将最终生成的 Code.ipa 上传作为 GitHub 产物供下载
      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: CodeApp-TrollStore-Unsigned
          path: ./build/Code.ipa
