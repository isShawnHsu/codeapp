name: Build & Export Unsigned IPA
on:
  push:
    branches: [main]
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击按钮触发编译

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macOS-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 1. 这一步至关重要：CodeApp 有一些底层的 framework 依赖需要运行脚本提前下载
      - name: Download Frameworks
        run: |
          chmod +x ./downloadFrameworks.sh
          ./downloadFrameworks.sh

      # 2. 自动寻找 .xcodeproj 文件并编译
      - name: Build with Xcode (No Signing)
        run: |
          # 1. 自动寻找当前项目下的 .xcodeproj 文件路径
          XCODE_PROJ=$(find . -name "*.xcodeproj" | head -n 1)
          echo "找到的工程文件路径: $XCODE_PROJ"
          
          # 2. 获取该工程名（去掉后缀作为默认 Scheme 名）
          PROJ_NAME=$(basename "$XCODE_PROJ" .xcodeproj)
          echo "提取的项目名称/Scheme: $PROJ_NAME"
          
          # 3. 列出该工程的所有 Schemes 供日志备查
          xcodebuild -project "$XCODE_PROJ" -list
          
          # 4. 执行无签名编译（自动填入找到的 project 和 scheme）
          xcodebuild archive \
            -project "$XCODE_PROJ" \
            -scheme "$PROJ_NAME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/Code.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      # 3. 动态匹配并打包成 IPA
      - name: Package to IPA
        run: |
          mkdir -p ./build/Payload
          
          # 自动寻找编译出来的 .app 文件夹并复制到 Payload
          APP_PATH=$(find ./build/Code.xcarchive/Products/Applications -name "*.app" | head -n 1)
          echo "找到的 App 路径: $APP_PATH"
          
          cp -r "$APP_PATH" ./build/Payload/
          cd ./build
          zip -r Code.ipa Payload
          
      # 4. 将生成的 Code.ipa 上传到 GitHub Actions 页面供你下载
      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: CodeApp-TrollStore-Unsigned
          path: ./build/Code.ipa
