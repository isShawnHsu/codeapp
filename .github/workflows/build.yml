name: Debug Project Schemes

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  debug_schemes:
    name: Look inside Code.xcodeproj
    runs-on: macOS-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 核心调试步骤：强制打印所有合法的 Scheme 名字
      - name: List All Schemes
        run: |
          echo "==============================================="
          echo "  以下是该项目所有的真实 Schemes 列表，请复制给我："
          echo "==============================================="
          xcodebuild -project Code.xcodeproj -list
          echo "==============================================="
