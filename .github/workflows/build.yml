name: Build & Export Unsigned IPA
on:
  push:
    branches: [main]
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击按钮触发编译

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macOS-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 1. 这一步至关重要：CodeApp 有一些底层的 framework 依赖需要运行脚本提前下载
      - name: Download Frameworks
        run: |
          chmod +x ./downloadFrameworks.sh
          ./downloadFrameworks.sh

      # 2. 绕过 Fastlane，直接使用 xcodebuild 编译一个不带签名的 .app 文件夹
      - name: Build with Xcode (No Signing)
        run: |
          # 自动列出当前目录下的所有 project 和 scheme，方便在日志中排查
          xcodebuild -list
          
          xcodebuild archive \
            -project CodeApp.xcodeproj \
            -scheme CodeApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/Code.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      # 3. 把编译出的 .app 规范地打包成 TrollStore 或自签工具可以直接识别的 .ipa 文件
      - name: Package to IPA
        run: |
          mkdir -p ./build/Payload
          cp -r ./build/Code.xcarchive/Products/Applications/Code.app ./build/Payload/
          cd ./build
          zip -r Code.ipa Payload
          
      # 4. 将生成的 Code.ipa 上传到 GitHub Actions 页面供你下载
      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: CodeApp-TrollStore-Unsigned
          path: ./build/Code.ipa
