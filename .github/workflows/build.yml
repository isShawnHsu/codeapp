name: Build & Export Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macOS-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 1. 下载底层依赖
      - name: Download Frameworks
        run: |
          chmod +x ./downloadFrameworks.sh
          ./downloadFrameworks.sh

      # 2. 【核心黑科技】源码与配置强力修复
      - name: Patch Project & Dependencies
        run: |
          echo "==== 开始全自动源码修复 ===="
          
          # 策略 A：强行降低整个项目和所有第三方库的 Swift 编译严苛度，允许警告并忽略部分死板检查
          find . -name "project.pbxproj" | while read -r pbx; do
            echo "正在修复: $pbx"
            # 强行关闭新版 Xcode 极其严格的隐式包及模块校验
            sed -i '' 's/SWIFT_TREAT_WARNINGS_AS_ERRORS = YES/SWIFT_TREAT_WARNINGS_AS_ERRORS = NO/g' "$pbx" || true
            sed -i '' 's/RUN_DOCUMENTATION_COMPILER = YES/RUN_DOCUMENTATION_COMPILER = NO/g' "$pbx" || true
            # 强行把所有目标的 Swift 版本锁死在 5.0 容错模式
            sed -i '' 's/SWIFT_VERSION = [0-9.]*/SWIFT_VERSION = 5.0/g' "$pbx" || true
          done

          # 策略 B：针对报错的 Runestone 核心编辑器库进行全面降级兼容
          # 强行在其配置中关闭显式模块构建
          echo "==== 注入编译降级配置 ===="

      # 3. 干净的纯粹编译
      - name: Build with Xcode (No Signing)
        run: |
          xcodebuild archive \
            -project Code.xcodeproj \
            -scheme "Code App" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/Code.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEBUG_INFORMATION_FORMAT=dwarf \
            SWIFT_COMPILATION_MODE=wholemodule \
            VALIDATE_WORKSPACE=NO \
            SWIFT_USE_EXPLICIT_MODULE_BUILD=NO \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO

      # 4. 打包 IPA
      - name: Package to IPA
        run: |
          mkdir -p ./build/Payload
          APP_PATH=$(find ./build/Code.xcarchive/Products/Applications -name "*.app" | head -n 1)
          echo "找到的实际 App 路径: $APP_PATH"
          cp -r "$APP_PATH" ./build/Payload/
          cd ./build
          zip -r Code.ipa Payload
          
      # 5. 上传产物
      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: CodeApp-TrollStore-Unsigned
          path: ./build/Code.ipa
